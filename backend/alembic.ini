# Alembic config — single source of truth for migration tooling.
#
# The actual database URL is NOT read from here; env.py loads it from
# `app.config.Settings` (and therefore `.env`) so that the application
# and migrations cannot drift apart. The value below is a placeholder
# that must remain syntactically valid for ConfigParser but is never
# used to connect.

[alembic]
script_location = migrations
prepend_sys_path = .
# `os` uses the platform path separator (`;` on Windows, `:` elsewhere).
# Required by Alembic 1.13+ — without it a deprecation warning fires on
# every invocation.
path_separator = os
timezone = UTC
# Numeric prefix + slug keeps revisions chronologically sortable while
# remaining searchable by descriptive name.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
sqlalchemy.url = driver://placeholder

# ── Logging ───────────────────────────────────────────────────────────────
# Migrations are infrequent operations worth surfacing — keep alembic
# at INFO so engineers see what is being applied. SQLAlchemy stays at
# WARN because the migration log already names every operation.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
